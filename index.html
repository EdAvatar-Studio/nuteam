<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuteam</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ece9e2;
  color:#1e1f22;
}

.container{
  width:90%;
  margin:auto;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:80px 0;
}

.hero-text h1{
  font-size:60px;
  margin:0;
}

.hero-text p{
  color:#aaa;
  margin:20px 0;
}

.btn{
  padding:12px 24px;
  border-radius:30px;
  border:1px solid #d6a85f;
  margin-right:10px;
  cursor:pointer;
  background:#fffaf0;
  color:#1e1f22;
}

.btn.primary{
  background:#d6a85f;
  color:#111;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin:60px 0;
}

.card{
  background:#f7f5f0;
  padding:20px;
  border-radius:16px;
  transition:0.3s;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.card:hover{
  border:1px solid #d6a85f;
  transform:translateY(-5px);
  box-shadow:0 14px 36px rgba(214,168,95,0.16);
}

/* APPS */
.apps{
  margin:60px 0;
}

.app-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:20px;
}

.app{
  background:#f7f5f0;
  padding:20px;
  border-radius:12px;
  text-align:center;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 8px 24px rgba(0,0,0,0.04);
}

/* FOOTER */
footer{
  margin-top:80px;
  padding:20px;
  text-align:center;
  color:#777;
}
</style>

</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <div class="hero-text">
    <h1>NUTEAM</h1>
    <h2>Expanding into Digital</h2>
    <p>A creative base for art, apps, local AI, and future exchange.</p>

    <button class="btn primary">Explore Apps</button>
    <button class="btn">Enter Ed</button>
  </div>

  <img src="hero.jpg" width="400">
</div>

<!-- CORE -->
<div class="grid">
  <div class="card">ART</div>
  <div class="card">APPS</div>
  <div class="card">ED / LOCAL AI</div>
  <div class="card">FUTURE EXCHANGE</div>
</div>

<!-- APPS -->
<div class="apps">
  <h2>APPS & APK</h2>
  <div class="app-grid">
    <div class="app">EdAvatar</div>
    <div class="app">Ed Prompt</div>
    <div class="app">Numo</div>
    <div class="app">More</div>
  </div>
</div>

</div>

<footer>
Nuteam © 2026
</footer>

</body>
</html>
